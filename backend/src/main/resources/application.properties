spring.application.name=asha-backend

# =========================
# Database Configuration
# =========================
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# =========================
# SQL Initialization
# =========================
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# =========================
# Jackson
# =========================
spring.jackson.serialization.FAIL_ON_EMPTY_BEANS=false

# =========================
# Server
# =========================
server.port=${PORT:8080}

# =========================
# AWS Bedrock
# =========================
bedrock.model-id=google.gemma-3-4b-it
bedrock.region=ap-south-1

# =========================
# Performance Observability & Actuator
# =========================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# =========================
# Virtual Threads (Java 21 Performance Tuning)
# =========================
spring.threads.virtual.enabled=true

# =========================
# Hibernate Statistics & SQL Timing
# =========================
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=info
